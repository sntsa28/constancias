<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Consulta y descarga de constancias">
  <title>Consulta de constancias</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="contenedor">
    <section class="tarjeta">
      <div class="icono" aria-hidden="true">✓</div>
      <h1>Consulta tu constancia</h1>
      <p class="introduccion">Escribe tu nombre completo o una parte de él.</p>

      <form id="formulario" role="search">
        <label for="nombre">Nombre de la persona</label>
        <div class="busqueda">
          <input id="nombre" name="nombre" type="search" minlength="3"
                 placeholder="Ejemplo: María López Hernández" autocomplete="name" required>
          <button type="submit">Buscar</button>
        </div>
      </form>

      <p id="estado" class="estado" aria-live="polite"></p>
      <div id="resultados" class="resultados"></div>
    </section>
  </main>
  <script src="js/buscador.js" defer></script>
</body>
</html>
