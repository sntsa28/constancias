name: Actualizar índice de constancias

on:
  push:
    branches: [main]
    paths:
      - "constancias/**"
      - "scripts/generar_indice.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Generar índice
        run: python3 scripts/generar_indice.py

      - name: Guardar índice actualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/constancias.json
          git diff --cached --quiet || git commit -m "Actualizar índice de constancias [skip ci]"
          git push
